<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - BookStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .checkout-steps {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }
        .step {
            text-align: center;
            padding: 0 20px;
            position: relative;
        }
        .step:not(:last-child):after {
            content: '';
            position: absolute;
            top: 25px;
            right: -30px;
            width: 40px;
            height: 2px;
            background: #dee2e6;
        }
        .step.active .step-number {
            background: #007bff;
            color: white;
            border-color: #007bff;
        }
        .step.completed .step-number {
            background: #28a745;
            color: white;
            border-color: #28a745;
        }
        .step-number {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid #dee2e6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin: 0 auto 10px;
            background: white;
        }
        .order-summary {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-book me-2"></i>BookStore
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container py-5">
        <h1 class="text-center mb-5">Checkout</h1>

        <!-- Checkout Steps -->
        <div class="checkout-steps">
            <div class="step active">
                <div class="step-number">1</div>
                <span>Shipping</span>
            </div>
            <div class="step">
                <div class="step-number">2</div>
                <span>Payment</span>
            </div>
            <div class="step">
                <div class="step-number">3</div>
                <span>Review</span>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-8">
                <div class="card mb-4">
                    <div class="card-body">
                        <h5 class="card-title mb-4">Shipping Address</h5>
                        <form id="shippingForm">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="fullName" class="form-label">Full Name</label>
                                    <input type="text" class="form-control" id="fullName" value="John Doe" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="email" class="form-label">Email Address</label>
                                    <input type="email" class="form-control" id="email" value="john@example.com" required>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="phone" class="form-label">Phone Number</label>
                                    <input type="tel" class="form-control" id="phone" value="123-456-7890" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="address" class="form-label">Street Address</label>
                                <input type="text" class="form-control" id="address" value="123 Main St" required>
                            </div>

                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label for="city" class="form-label">City</label>
                                    <input type="text" class="form-control" id="city" value="New York" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="state" class="form-label">State</label>
                                    <input type="text" class="form-control" id="state" value="NY" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="zipCode" class="form-label">ZIP Code</label>
                                    <input type="text" class="form-control" id="zipCode" value="10001" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="country" class="form-label">Country</label>
                                <select class="form-select" id="country" required>
                                    <option value="USA" selected>United States</option>
                                    <option value="Canada">Canada</option>
                                    <option value="UK">United Kingdom</option>
                                    <option value="Australia">Australia</option>
                                </select>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card mb-4">
                    <div class="card-body">
                        <h5 class="card-title mb-4">Payment Method</h5>
                        
                        <div class="list-group">
                            <label class="list-group-item d-flex align-items-center">
                                <input class="form-check-input me-3" type="radio" name="paymentMethod" value="credit_card" checked>
                                <i class="fab fa-cc-visa fa-2x me-3"></i>
                                <div>
                                    <h6 class="mb-0">Credit Card</h6>
                                    <small class="text-muted">Pay with Visa, Mastercard, or American Express</small>
                                </div>
                            </label>
                            <label class="list-group-item d-flex align-items-center">
                                <input class="form-check-input me-3" type="radio" name="paymentMethod" value="paypal">
                                <i class="fab fa-paypal fa-2x me-3"></i>
                                <div>
                                    <h6 class="mb-0">PayPal</h6>
                                    <small class="text-muted">Pay with your PayPal account</small>
                                </div>
                            </label>
                            <label class="list-group-item d-flex align-items-center">
                                <input class="form-check-input me-3" type="radio" name="paymentMethod" value="cod">
                                <i class="fas fa-money-bill fa-2x me-3"></i>
                                <div>
                                    <h6 class="mb-0">Cash on Delivery</h6>
                                    <small class="text-muted">Pay when you receive your order</small>
                                </div>
                            </label>
                        </div>

                        <!-- Credit Card Details (shown when credit card is selected) -->
                        <div id="creditCardDetails" class="mt-4">
                            <div class="row">
                                <div class="col-md-8 mb-3">
                                    <label class="form-label">Card Number</label>
                                    <input type="text" class="form-control" placeholder="1234 5678 9012 3456">
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">CVV</label>
                                    <input type="text" class="form-control" placeholder="123">
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Expiry Month</label>
                                    <select class="form-select">
                                        <option>01 - January</option>
                                        <option>02 - February</option>
                                        <option>03 - March</option>
                                        <option>04 - April</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Expiry Year</label>
                                    <select class="form-select">
                                        <option>2024</option>
                                        <option>2025</option>
                                        <option>2026</option>
                                        <option>2027</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="order-summary">
                    <h5 class="mb-3">Order Summary</h5>
                    
                    <div class="mb-3">
                        <div class="d-flex justify-content-between mb-2">
                            <span>The Great Gatsby</span>
                            <span>$12.99</span>
                        </div>
                        <div class="d-flex justify-content-between mb-2">
                            <span>To Kill a Mockingbird (x2)</span>
                            <span>$29.98</span>
                        </div>
                    </div>

                    <hr>

                    <div class="d-flex justify-content-between mb-2">
                        <span>Subtotal</span>
                        <span>$42.97</span>
                    </div>
                    
                    <div class="d-flex justify-content-between mb-2">
                        <span>Shipping</span>
                        <span class="text-success">Free</span>
                    </div>
                    
                    <div class="d-flex justify-content-between mb-2">
                        <span>Tax</span>
                        <span>$3.44</span>
                    </div>
                    
                    <hr>
                    
                    <div class="d-flex justify-content-between mb-4">
                        <strong>Total</strong>
                        <strong class="text-primary h5">$46.41</strong>
                    </div>

                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="saveInfo">
                        <label class="form-check-label" for="saveInfo">
                            Save this information for next time
                        </label>
                    </div>

                    <button class="btn btn-primary w-100 mb-2" onclick="placeOrder()">
                        Place Order
                    </button>

                    <a href="cart.html" class="btn btn-outline-secondary w-100">
                        Back to Cart
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function placeOrder() {
            // Generate random order number
            const orderNumber = 'ORD-' + Math.random().toString(36).substr(2, 9).toUpperCase();
            
            // Store order in localStorage
            const order = {
                id: orderNumber,
                date: new Date().toISOString(),
                total: 46.41,
                status: 'Processing'
            };
            
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            orders.push(order);
            localStorage.setItem('orders', JSON.stringify(orders));
            
            // Clear cart
            localStorage.removeItem('cart');
            
            // Redirect to confirmation page
            window.location.href = 'order-confirmation.html?order=' + orderNumber;
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
